# =============================================================================
# 多航点通用路径配置文件
# =============================================================================
# 每个航点包含:
#   x, y, z      - ENU 坐标系下的目标位置 (m)
#   hover_time   - 到达后悬停时长 (s), 0 表示途经点不做停留
#
# 任务流程:
#   起飞 → 航点[0] → 悬停 → 航点[1] → 悬停 → ... → 最后航点 → 自动降落
# =============================================================================

waypoints:
  # 航点 1: 取货点 A (到达后悬停 5 秒，模拟取货)
  - x: 4.0
    y: 4.0
    z: 2.5
    hover_time: 5.0

  # 航点 2: 送货点 B (到达后直接降落)
  - x: 15.0
    y: 12.0
    z: 2.5
    hover_time: 0.0

# -----------------------------------------------------------------------------
# 扩展示例 (取消注释即可测试):
# -----------------------------------------------------------------------------
# waypoints:
#   - {x: 4.0,  y: 4.0,  z: 2.5, hover_time: 3.0}   # A 点取货
#   - {x: 8.0,  y: 8.0,  z: 3.0, hover_time: 0.0}   # 途经中转
#   - {x: 15.0, y: 12.0, z: 2.5, hover_time: 3.0}   # B 点送货
#   - {x: 0.0,  y: 0.0,  z: 2.5, hover_time: 0.0}   # 返回原点降落
